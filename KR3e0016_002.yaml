body:
  text: 顱𩕄經卷下火丹證治黃帝問歧伯曰後生少稚多被惡疾丹毒二品若何分之歧伯曰陽解百年一十已上為毒一十已下為丹丹毒一也隨其大小分别之治之有毒至依方萬無一差喻人間男女皆遭丹毒至依此枉死者復何限哉良由信邪師之語仍被恐之愚昧之人勿與下手請依方用之今出此圖形狀如後伊火丹從兩脅起神竈丹從肚起尿竈丹從踝起胡吹竈丹從陰囊上起天火丹從腹背遍身起天雷丹從頭項起熛火丹從背甲起胡漏竈丹從臍中起廢竈丹從曲臂起神氣丹從頭背上起土竈丹從陰踝起朱黃丹赤豆色遍身上起螢火丹從且起野竈丹從背脊起鬼火丹從面上起伊火丹從兩脅起右用豬糞燒灰并鐵槽中泥拌調塗之日三神竈丹從肚起右用土蜂窠杏仁膩粉生油調塗立差尿竈丹從踝起右用屋四角頭茅草燒灰使雞子白調塗之胡吹竈丹從陰囊上起右用水茄窠下泥和苦酒塗之天火丹從腹背遍身起右用樺皮白末和生油調塗之亦用赤石脂羊脂調塗之天雷丹從頭項起右用陰乾蔥赤末拌脂塗又用竈下土雞子白調塗胡漏竈丹從臍中起右用屋漏水調竈中土塗之廢竈丹從曲臂起右用屋四角茅草灰雞子白調塗之神氣丹從頭背上起右用牯牛骨燒灰羊脂塗之土竈丹從陰踝起右用屋四角茅草竈橫麻及雞子白調塗之朱黃丹赤豆色遍身上起右用慎火草搗汁和酒調塗之螢火丹從耳起右用慎火草搗汁塗之聖惠以醋調塗野竈丹從背脊起右用柔香茸蒴􅀢赤小豆末塗之立差鬼火丹從面上起右用竈下土雞子白調塗之立差雜證平和飲子小兒初生可日與之人參茯苓甘草炙升麻已上各一分右以水一白盞煎至一合半已來時時與之乳母忌油膩滿月及百晬以來加之臨時冷加白术熱加缺各半錢又方治孩子臍中不乾白礬一錢煅過龍骨一分右為細末入麝香少許每次使拭臍乾糝之用帕裏避風青木香散治孩子陰囊或如疝腫脹狐陰一雙炙蒺藜炒地膚子昆布枳殼炒槐子炒各一分右為末一歲二歲空心米飲下一錢又方治孩子蛔蟲咬心痛面伏地卧口吐清水痰涎檳榔苦棟根鶴蝨炒各半兩右為末空心熱茶下一錢以意加减忌粘食杏仁丸治孩子或渴此是蛔蟲傷杏仁去皮尖膩粉各一分右為末每用唾丸空心米飲茶任下二丸又方治孩子赤逰腫或如丹煩渴渾身赤瘤壯熱菉豆粉鉛白霜右細研蕓薹汁調塗之又方取鉛霜法將鉛來於石上打令薄掘地作坑可鉛片大以杵搗坑實滿坑著醋以鉛蓋定經一宿去取霜如珠子大和藥使之如煩渴以後服解熱飲子又方麥門冬小蘆根竹葉乾葛漏蘆犀角屑右用水四合藥半兩煎一合無問食前後徐徐與之消石散治孩兒身上無故腫但覺肉色赤熱消石大黃菉豆各等分右為末每用時隨腫大小取莙薘根研汁調塗腫上如有惡物即看有㸃子以膏貼之四面以散子熁之若無莙薘根即用雞子白或車前根葉亦得又方治孩子胎中受風長後或滿身生瘡沸癢如疹癆或如飢飽癢瘡葱白硝臭黃硫黃各等分右用油半兩燒令熱下少許蠟先剝葱白三莖細切待油熱即潑葱上細研續下硫黃臭黃硝更研之旋塗茴香散治孩兒赤眼并胎熱及疳障多淚茴香冬青膽陰乾生甘草右為細末每洗眼時取藥一分水一盞煎十沸後溫洗之或孩兒長大即加藥并水引子方孩兒用藥洗眼後可更服之知母黃芩青箱子地蛹子秦皮車前草山梔子獨活各等分右藥以水五合煎二合去滓溫服忌食如常又方治孩子聤耳白礬半兩燒過龍骨鉛丹燒各一分麝香少許右為末以綿裹竹枝子淨探膿水以一小豆大藥傅之别以綿裹塞填之勿令見風又方治小兒聤耳石硫黃製右為細末以糝耳中日一夜一又方治孩子小便不通茯苓通草冬瓜子車前子各等分右以水四合藥半兩煎一合半作二服忌油膩側柏散治孩兒風熱側柏鬱金天麻酒浸一宿乾蝎天南星地黃去土子芩大黃已上各半兩右為末治風及驚溫酒下退熱每夜熟水下半錢柴胡引子治小兒行遲小兒自小傷抱腳纎細無力行止不得或骨熱疳勞肌肉消瘦柴胡鱉甲米醋塗炙知母桔梗枳殼麩炒去瓤𤣥參升麻右藥等分並細銼每日煎時三歲以下取藥半兩水五合煎二合去滓分兩服空心食前後各一服忌毒物飲後用澡浴方澡浴方苦參茯苓皮蒼术桑白皮白礬各半兩蔥白少許右藥銼細每浴時取一兩沸水二升浸藥後通溫與兒浴之避風於溫處妙又方治小兒數歲不能行取葬家未開户盜其飯食來以哺之不過三日便起行勿令人知之
