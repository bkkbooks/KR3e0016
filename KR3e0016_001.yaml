front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0016_WYG_001-1a, image: WYG0738/WYG0738-0003c.png}
body:
  text: 顱𩕄經卷上脉法凡孩子三歳已下呼為純陽元氣未𣪚若有脉候即須於一寸取之不得同大人分寸其脉候未來呼之脉來三至吸之脉來三至呼吸定息一至此為無患矣所言定息呼氣未出吸氣未入定息之中又至此是平和也若以大人脉五至取之即差矣如此七至已上即為有氣或脉浮如弓之張弦此為有風並可依後方合藥治之或七至已下此為冷候亦宜依後方合藥療之或診候取平或忽而不見沉浮不定伏益根平者此為神鬼之病且合求祟續宜使藥或桃桞枝湯浴煎飲子為使一兩顆桃心孩子脉呼吸十五至已上三至以下皆死矣病證初生小兒鵝口撮噤並是出胎客風着顱臍致有此可以小艾灸三壯及烙之愈初生小兒至夜啼者是有瘀血腹痛夜乘陰而痛則啼初生小兒一月内乳痢如膠是母寒氣傷胃所致也初生小兒一月内乳痢如血是母胷有滯熱所作也初生小兒一月内兩眼赤者是在胎之時母喫灸煿熱麫壅滯氣入胎中熏兒腦所致也小兒温熱皆因從氣熱而搏胃氣然若下之平氣即愈氣虚則生驚而變癎小兒驚癎一從虚邪客熱相搏而生其候當用補飬安和即愈加以性冷及太過即死小兒噦逆吐皆胃氣虚逆氣客於藏氣而作當和胃飬氣至如下冷即極小兒霍亂吐逆皆胃氣與陰陽氣上下交爭而作當用分和補藥調飬即愈餘皆死小兒客忤無辜皆因客入所觸及暴露星月小兒嫩弱所以此候多惡小兒一眼青揉癢是肝疳二齒焦是骨疳三肉色鼻中乾是肺疳四皮乾肉裂是筋疳五髪焦黄是血疳六舌上生瘡是心疳七愛喫泥土是脾疳孩子肌膚肥實皮膚白無故煩渴此自小妳猛衝損肺但依後方内用甘草人參合飲子若氣急甚胷脹起鼻連眼下臉青色呻吟之聲者此必死之兆不得與藥孩子利如泔靛者難效利如鵝鴨血者脾已爛損不宜與藥孩子凡有諸色疾苦但眼瞼下垂牽必定死矣孩子瘧皆難效或發無時即口噤咬牙作聲此必死矣呼為瀝瘠疳瘧亦名為鎻腸疳孩子渴喫乳食夜啼作聲此即是腹肚痛孩子無故摇頭此是腦頂風孩子喫乳食皆出此是脾冷孩子無故肚大項細四肢消瘦筋脉骨節起自是小來少乳嚼食與喫早成骨熱疳勞先宜與保童丸吃續與柴胡鼈甲引子保童丸方見一切疳門中柴胡飲子方見行遲門中孩兒頭面胷膊肌厚臂脛細瘦行走遲者是小兒抱損孩子鼻流清涕或鼻下赤痒此是腦中鼻中疳極冝用後方青黛散吹鼻兼傅下赤爛處方見疳疾吹鼻門中已前並診候孩子疾狀孩子氣脉未調蔵府脆薄腠理開踈㸔脉以時依方用藥孩子或夏中熱時因乳母沐浴多使冷水妳得冷氣血脉皆伏見孩兒氣未定便與妳使孩子多胃毒及赤白兩般惡痢此乃是妳母之過凡浴後可令定息良久候氣定揉與之即全無患師巫燒錢乳毋須預祝之勿令着水噴兒皆令驚熱入心轉成患害切細慎之凡孩子自生但任陰陽推移即毎六十日一度變蒸此骨節長來四肢發熱或不下食乳遇如此之時上唇有珠子如粟粒大此呼為變蒸珠子以後方退熱飲子療之不宜别與方藥㓜㓜新書注云顱𩕄經以六十日為一變巢氏病源以三十二日為一變説有不同故兼存之驚癎癲證治牛黄丸治小兒胎驚及癎或心熱牛黄龍齒馬牙硝鐵焰粉各一分右為細末錬蜜丸如梧桐子大毎日乳食前熟水調破一丸灌下令母忌口又牛黄丸治孩子驚熱入心擬成癎疾面色不定啼哭不出潮熱無度不吃乳食大段眼翻露白手足逆冷呼喚不應牛黄研大黄獨活各一分琥珀炙别研升麻菉豆粉大麻仁别研各半兩右為末蜜丸如梧子大空心熟水下一丸頓服之食後再服一丸至十歳加金銀箔各五片忌煿炙毒物虎睛丸治孩兒風癎驚啼不喫乳虎睛一隻犀角子芩各等分梔子仁大黄各十分右五味為細末鍊蜜丸如梧子大驚啼不喫妳乳汁下七丸風癎米飲下五丸至七丸兒小减丸數取利為度忌毒物若有虚熱加知母六分又虎睛丸治小兒孩子二十四種驚癎壯熱抽掣脚手嘔吐夜啼眼腫虎睛一隻聖恵用一對梔子仁茯苓各二分牛黄少許聖恵用半兩人参一分聖恵用一兩鈎藤大黄各四分犀角末一分聖恵用二兩黄芩一分聖恵用一兩蛇退七寸燒灰分聖恵用一右為末蜜丸如黍米大空心熟水下隨年丸輕者一服重者三服妳汁下亦得聖恵熟水下妳母忌一切生冷油膩毒物廣利方治孩子驚癎不知迷悶嚼舌仰目牛黄一大豆右為細末研和蜜水服之二十二味虎睛丸治孩子從一歳至大癲發無時口出白沫小便淋瀝不利虎睛一隻生眼佳曝乾酒浸令黄色真珠蜂房各三錢麻黄二分去節鈎藤三分鐵精防葵大黄子芩龍齒銀屑梔子仁羌活各四分柴胡升麻白蘚皮雷丸燒令赤人參各三分細辛一分半蛇皮五寸炙石膏五分蚱蟬四枚去翅足炙右為末蜜丸如赤豆大四五歳五丸日再服大兒十丸濃煎米飲下忌生冷油膩疳痢證治保童丸治小兒孩子諸色疳候或腹内虚脹驚癎頭髪立常咬手指脊疳疳勞臂脛細弱倚立不得及鼻下常赤清涕流涎不止舌上生瘡腦疳口疳腹上筋脉虎睛半隻硃砂麝香各一錢牛黄龍腦巴豆芎藭桔梗枳殻檀香茯神人參當歸羌活代赭鶴虱白术各半兩右為細末下香砂巴豆令匀錬蜜丸如梧子大一歳至五歳毎日一丸十歳每日兩丸並空心米飲下但稍知孩子病甚即加藥與之孩子未較妳母忌生冷油膩灸煿毒魚大蒜米醋又方治孩子疳痢諸色疳并一十五種病狀一腹大二皮膚黑黄三骨節麤四眼赤五口赤六鼻中生瘡七頭髪黄八咬指甲九愛喫土十愛喫甜物十一身熱十二頭大十三臍凸十四項細十五靣無光並冝常服保童丸方硃砂牛黄麝香蟾酥各少許阿魏二分右先將硃砂於凈器中研如粉入諸藥一時以蒸餅為丸忌羊血生冷等又方治孩子疳氣或醸肚脹上筋脉頭大項細喫物不知足夜中即起腹内長鳴大黄一兩陳橘皮二兩酸醋二合浸二日曬乾蜣蜋二十箇去翅足子熱燒醋安之以盃盖地上去火毒候冷取出炒過右為末蜜丸如梧子大毎日空心熟水下十丸忌如常紫雪圓方治小兒五疳兼腹肚虚脹疳氣煩悶或時燥渴大黄黄連代赭各二分硃砂麝香各少許杏仁去皮尖别研肉豆䓻巴荳去皮以冷水浸别研各一兩右為細末蜜丸如梧子大毎服空心米飲湯下一圓五歳十歳只可服五丸臨時加減忌冷水油膩炙煿硃砂丸治孩子疳痢辨蟲顔色定吉凶硃砂半石蓮大阿魏如硃砂大蝙蝠血三兩滴蟾酥少許右為細末和少許口脂調先以桃柳枝煎湯浴兒後㸔小兒大小以菉豆大填兒臍中後用紙片向臍中貼之用青衣盖兒㸔蟲出來黄色輕青黒色重青黛散治孩子鼻流清涕或鼻下赤癢青黛一錢蘆㑹地龍各半錢硃砂一字七𤓰蔕半錢細辛一錢宣連半錢右為細末和合吹鼻中入麝香少許保童丸硃砂麝香新蟾酥各等分右研合成劑合子内盛丸如麻子大又於一合子内浸一丸以筯頭㸃入鼻中亦名問命丸但孩子病甚即與吹之或得七噴可以治之五噴即甚三兩噴即死矣此不可深著水浸臨時入水亦不畏盖腦散治孩子腦疳鼻癢毛髪作穂面色赤地榆炙蝦䗫燒各一分蝸牛殻二十一箇青黛石蜜各二分麝香右為末吹鼻當有黄水出忌甜物胡黄連丸治孩子熱疳胡黄連蟾酥各等分右為末蜜丸如菉豆大五歳熟水送下二丸調中丸治孩子諸疳或熱攻衝心肺氣急晝夜有汗日漸羸瘦不吃乳食柴胡茯苓人參木香桂心大黄濕紙裏煨枳殻甘草炙鱉甲醋炙各等分右為末蜜丸如桐子大毎歳兩丸至五歳三丸熟水下忌如常地黄煎方治孩子疳勞肺氣熱欬𠻳四肢漸瘦心肺乾生地黄汁五兩酥生薑汁蜜各一兩鹿角膠半兩右先將地黄汁安鍋内慢火煎手不住攪約五六沸下酥又五六沸下蜜次下膠又下薑汁慢火煎候如稀餳即住火毎食後兩度共與一匙頭忌毒物又方治孩兒疳蝕口齒齒齦宣露臭穢不可近葶藶炒梧桐律等分右為末以臘月豬脂調微煎作膏取桞木筋子綿褁㣲微揾藥時烙又方治孩子疳蝕脣鼻及諸瘡硫黄乾漆文蛤右等分燒灰稍煙盡研為末入麝子少許以帛拭瘡膿血後用藥乾糝之立效又方治孩子初患諸色痢及微有疳氣右用枳實不限多少炒令黒拗破㸔内外相似為散空心米飲下半錢以歳加減服之忌如常又方治孩子赤白痢阿膠赤石脂枳殻麩炒龍骨訶子炮半熟去核各半兩白术右為末一歳二歳空心米飲下半錢又方治孩子冷毒疳痢白膿疳靛日加瘦弱不喫食腹痛青木香一分黄連半兩右為末蜜丸如梧子大一歳以上空心熟水下一丸三歳五歳服二丸藥性熱者不宜多服忌生冷温脾散治孩子水瀉利并脾冷食乳不消喫妳頻吐附子乾薑甘草炮剉各半兩白术一兩右為末空心米飲下半錢忌鮮魚毒物顱𩕄經卷上考證第一頁後二行三行原本依後方同藥治之按後方已佚謹簽出聲明第二頁前一行以小艾灸三壯原本脱艾字謹増第五頁前六行灌字原本訛蒲謹校正第七頁前三行注生眼訛在眼謹校正十二頁前七行稀餳原本訛稀錫謹校正
