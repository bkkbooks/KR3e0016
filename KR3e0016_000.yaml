body:
  text: 提要顱𩕄經二卷醫家類臣等謹案顱𩕄經二卷不著撰人名氏世亦别無傳本獨永樂大典內載有其書考厯代史志自唐藝文志以上皆無此名至宋藝文志始有師巫顱𩕄經二卷今撿此書前有序文一篇稱王母金文黃帝得之升天祕藏金匱名曰內經百姓莫可見之後穆王賢士師巫於崆洞山得而釋之云云其所言師巫與宋志相合當即此本疑其唐末宋初人所為以王冰素問注第七卷內有師氏藏之一語遂托名師巫以自神其説耳其名顱𩕄者案首骨曰顱腦蓋曰𩕄殆因小兒初生顱𩕄未合證治各别故取以名其書首論脈候至數之法小兒與大人不同次論受病之本與治療之術皆深中肯綮要言不煩次論火丹證治分列十五名目皆他書所未嘗見其論雜證亦多祕方非後世俗醫所可及蓋必别有師承故能精晰如此宋史方技傳載錢乙始以顱𩕄經著名至京師視長公主女疾授翰林醫學乙幼科冠絶一代而其源實出於此書亦可知其術之精矣謹據永樂大典所載褒而輯之依宋志舊目釐為二卷俾不至無傳於後焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序夫顱𩕄者謂天地陰陽化感顱𩕄故受名也嘗覽黃帝內傳王母金文始演四序二儀陰陽之術三才一元之道採御靈機黃帝得之升天祕藏金匱名曰內經百姓莫可見之後穆王賢士師巫於崆洞山得而釋之敘天地大德陰陽化功父母交和中成胎質爰自精凝血室兒感陽興血入精宫女隨陰住故以清氣降而陽谷生濁氣升而陰井盛也甚者二儀互換五氣相參目覩元機非賢莫逹謂真陰錯雜使精血聚而成殃陽發異端感榮衛合而有疾遂使嬰兒才養驚候多生庸愚不測始末亂施攻療便致枉損嬰兒吁哉吁哉遂究古言尋察端由敘成疾目曰顱𩕄經焉真憑辨證乃定死生後學之流審依濟疾天和太清降乘赤海真一元氣乘之則母情先搖蕩漾熾然是陽盛發陰當妊男也六脈諸經皆舉其陽證所謂妊衰不勝藏氣則觸忤而便傷妊勝而氣劣則母疾三五月而發皆隨五藏心藏乾而口苦舌乾肺藏渴而多涕發寒肝藏邪而肢酸多睡脾藏發而嘔逆惡食腎藏困而軟弱無力藏妊氣平則和而無苦胎若劣而強得藏飬至生亦乃多疾二儀純陰之證升雜真一者謂陰發陽則父精薄妊當成女也六脈諸經皆發陰證若血盛氣衰則肥而劣氣若氣盛血衰則瘦而壯氣餘藏妊之氣皆同男説孩子處母腹之內時受化和之正氣分陰陽之紀綱天地降靈十月而化萬物以生成隨其時變大理清純化成祥瑞之基全真道一故生成焉一月為胚精血凝也二月為胎形兆分也三月陽神為三魂動以生也四月陰靈為七魄靜鎮形也五月五行分藏安神也六月六律定腑滋靈也七月精開竅通光明也八月元神具降真靈也九月宫室羅布以生人也十月氣足萬物成也太乙元真在頭曰泥丸總衆神也得諸百靈以禦邪氣陶甄萬類以靜為源是知慎於調護即以守恬和可以保長生耳故小兒瘦痾蓋他人之過也
